<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Banco Hexagonal</title>
  {% load static %}
  <link rel="stylesheet" href="{% static 'css/estilo.css' %}">
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Banco Hexagonal</h1>
      <p>Iniciar sesión en tu cuenta</p>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="field-group">
        <label for="id_username">Usuario</label>
        <input type="text" name="username" id="id_username" 
               autocomplete="username" 
               aria-label="Nombre de usuario" required>
      </div>
      <div class="field-group">
        <label for="id_password">Contraseña</label>
        <input type="password" name="password" id="id_password" 
               autocomplete="current-password" 
               aria-label="Contraseña" required>
      </div>
      {% if form.non_field_errors %}
        <ul class="errorlist" role="alert">
          {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    <div class="footer-text">
      ¿No tienes cuenta? <a href="{% url 'registro' %}">Abrir una cuenta</a>
    </div>
    <div style="text-align: center; margin-top: 1rem;">
      <a href="{% url 'inicio' %}" class="btn-secondary" style="display: inline-block;">Volver al inicio</a>
    </div>
  </div>
</body>
</html>
