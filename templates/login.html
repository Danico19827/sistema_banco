<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sesión - Banco Hexagonal</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f3f4f6;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 1rem;
    }
    .card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1), 0 2px 4px -2px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }
    .logo {
      text-align: center;
      margin-bottom: 1.5rem;
    }
    .logo h1 {
      font-size: 1.5rem;
      font-weight: 600;
      color: #111827;
    }
    .logo p {
      color: #6b7280;
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }
    form {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .field-group {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }
    label {
      font-size: 0.875rem;
      font-weight: 500;
      color: #374151;
    }
    input {
      padding: 0.625rem 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 0.875rem;
      transition: border-color 0.15s ease;
      outline: none;
      background: #f9fafb;
    }
    input:focus {
      border-color: #2563eb;
      box-shadow: 0 0 0 2px rgba(37,99,235,0.1);
    }
    .errorlist {
      color: #dc2626;
      font-size: 0.75rem;
      list-style: none;
      padding: 0;
    }
    .btn-primary {
      background: #111827;
      color: white;
      border: none;
      padding: 0.75rem;
      border-radius: 8px;
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: background 0.2s ease;
      margin-top: 0.5rem;
    }
    .btn-primary:hover {
      background: #1f2937;
    }
    .footer-text {
      text-align: center;
      font-size: 0.875rem;
      color: #6b7280;
      margin-top: 1.5rem;
    }
    .footer-text a {
      color: #2563eb;
      text-decoration: none;
    }
    .footer-text a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <h1>Banco Hexagonal</h1>
      <p>Iniciar sesión en tu cuenta</p>
    </div>
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="field-group">
        <label for="{{ form.username.id_for_label }}">Usuario</label>
        {{ form.username }}
      </div>
      <div class="field-group">
        <label for="{{ form.password.id_for_label }}">Contraseña</label>
        {{ form.password }}
      </div>
      {% if form.non_field_errors %}
        <ul class="errorlist">
          {% for error in form.non_field_errors %}
            <li>{{ error }}</li>
          {% endfor %}
        </ul>
      {% endif %}
      <button type="submit" class="btn-primary">Ingresar</button>
    </form>
    <div class="footer-text">
      ¿No tienes cuenta? <a href="{% url 'registro' %}">Abrir una cuenta</a>
    </div>
  </div>
</body>
</html>
